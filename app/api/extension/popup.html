<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Save Grain</title>
  <style>
    body { font-family: sans-serif; width: 300px; padding: 16px; margin: 0; background: #fff; color: #000; }
    h2 { margin-top: 0; font-size: 16px; }
    select, button { width: 100%; padding: 8px; margin-top: 10px; border-radius: 6px; border: 1px solid #ccc; }
    button { background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #333; }
    #status { margin-top: 10px; font-size: 12px; color: #666; text-align: center; }
  </style>
</head>
<body>
  <h2>Save to Grains</h2>
  <div id="auth-warning" style="display: none; color: red; font-size: 12px; margin-bottom: 10px;">
    Please log in to the Grains web app first.
  </div>
  
  <select id="category-select">
    <option value="uncategorized">Loading categories...</option>
  </select>

  <button id="save-btn">Capture Grain</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
